<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FutureMail{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <nav class="glass-nav">
        <div class="nav-brand">
            <a href="{% url 'letters:list' %}">FutureMail.com</a>
        </div>
        <div class="nav-links">
            {% if user.is_authenticated %}
            <a href="{% url 'letters:create' %}">New Letter</a>
            <form method="post" action="{% url 'account_logout' %}" style="display:inline;">
                {% csrf_token %}
                <button type="submit" class="btn btn-outline">Log Out</button>
            </form>
            {% else %}
            <a href="{% url 'account_login' %}">Log In</a>
            <a href="{% url 'account_signup' %}" class="btn btn-primary">Sign Up</a>
            {% endif %}
        </div>
    </nav>

    <main class="container">
        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">
                {{ message }}
            </div>
            {% endfor %}
        </div>
        {% endif %}

        {% block content %}
        {% endblock %}
    </main>

    <script src="{% static 'js/app.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>

</html>
